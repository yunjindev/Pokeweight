<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokeweight</title>
    <link rel="stylesheet" href="src/styles.css">
    <link rel="icon" href="assets/pokemon-icon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Pokeweight</h1>
        <p>Compare two different pokemon to see who is heavier!</p>
        <div class="pokeSubmit">
            <input class="pokeInput" id="pokemonOneInput" type="text" placeholder="e.g. pikachu">
        </div>
         <div class="pokeSubmit">
            <input class="pokeInput" id="pokemonTwoInput" type="text" placeholder="e.g. snorlax">
            
        </div>
        <button id="submitBtn" >Submit</button>
    </div>
        <div id="pokeResult" hidden>
            <h2 id="pokeCompare"></h2>
        </div>
    <footer>
        These weights are all pulled from pokeapi.
    </footer>
    <img id="pikagif" src="assets/pikachu.gif">
    <script src="src/script.js"></script>
</body>
</html>
